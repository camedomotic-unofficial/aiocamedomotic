name: Unit tests and coverage report

on:
  push:
    branches: [main, update-version]
    paths:
      - "aiocamedomotic/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/code-tests.yml"
  pull_request:
    # Always run for PRs to satisfy required status checks
    branches: [main, update-version]
  workflow_dispatch:

# Define minimal required permissions at workflow level
permissions:
  contents: read

# Cancel superseded runs on the same PR; never cancel runs on main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'poetry.lock') }}

      - name: Install package and its dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --with tests

      - name: Run pytest with coverage
        run: poetry run pytest --timeout 10 --cov=aiocamedomotic --cov-report xml --cov-report term-missing

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: "pytest-${{ matrix.python-version }}"
          flags: "pytest-coverage,python-${{ matrix.python-version }}"
          fail_ci_if_error: false
          files: ./coverage.xml

  # Gate job: single required status check for branch protection
  tests:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more test jobs failed"
            exit 1
          fi
