name: Build LLM documentation

on:
  push:
    branches:
      - main
    paths:
      - "README.rst"
      - "docs/source/**"
      - "aiocamedomotic/**/*.py"
      - "scripts/build_llms_docs.py"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-llms-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/source/requirements.txt

      - name: Build Markdown documentation
        run: sphinx-build -b markdown docs/source/ docs/build/markdown

      - name: Assemble llms.txt and llms-full.txt
        run: python scripts/build_llms_docs.py --skip-sphinx-build

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet llms.txt llms-full.txt 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updated LLM docs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          BRANCH_NAME="docs/auto-update-llms-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add llms.txt llms-full.txt
          git commit -m "docs: update llms.txt and llms-full.txt"
          git push origin "$BRANCH_NAME"
          PR_URL=$(gh pr create \
            --title "docs: update LLM documentation files" \
            --body "$(cat <<'EOF'
          Automated update of `llms.txt` and `llms-full.txt` triggered by changes
          to source code or documentation.

          These files are auto-generated by `scripts/build_llms_docs.py` from the
          Sphinx documentation.
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME")
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_MERGE_PR_PAT }}
