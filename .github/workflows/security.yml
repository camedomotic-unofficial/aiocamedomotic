name: Security checks

on:
  push:
    branches: [main, update-version]
    paths-ignore:
      - "**.rst"
      - "**.md"
      - "docs/**"
      - ".github/**"
  pull_request:
    # Always run for PRs to satisfy required status checks
    branches: [main, update-version]
  schedule:
    # Twice per month (7th and 22nd) at 5:45 AM UTC
    - cron: "45 5 7 * *"
    - cron: "45 5 22 * *"
  workflow_dispatch:

# Define minimal required permissions at workflow level
permissions:
  contents: read
  security-events: write # For reporting security issues

# Cancel superseded runs on the same PR; never cancel runs on main or schedule
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Bandit
        run: |
          pipx run "bandit[toml]" -c pyproject.toml -r ./aiocamedomotic

  gitguardian:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetch all history so multiple commits can be scanned

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@da20be06cafe5e8633dc24744efe1efe8d30f06b # v1.52.2
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # Gate job: single required status check for branch protection
  security:
    if: always()
    needs: [bandit, gitguardian]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.bandit.result }}" != "success" || \
                "${{ needs.gitguardian.result }}" != "success" ]]; then
            echo "One or more security checks failed"
            exit 1
          fi
