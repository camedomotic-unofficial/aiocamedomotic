# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build ReadTheDocs documentation

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
    paths:
      - README.rst
      - "docs/**" # Trigger only when documentation changes
      - ".readthedocs.yaml" # Also trigger when RTD configuration changes
  pull_request:
    branches:
      - main
    paths:
      - README.rst
      - "docs/**"
      - ".readthedocs.yaml"
  workflow_dispatch: # Allow manual triggering of the workflow
    # inputs:
    #   branch:
    #     description: 'Branch to build documentation for'
    #     required: false
    #     default: 'main'

# Define minimal required permissions at workflow level
permissions:
  contents: read

# Cancel superseded runs on the same PR; never cancel runs on main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14" # Set this to your required version of Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/source/requirements.txt

      - name: Build documentation with Sphinx
        run: |
          sphinx-build -b html docs/source/ docs/build/html

        # TODO sphinx-build -b linkcheck . _build/linkcheck
