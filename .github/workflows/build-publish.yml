# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build and publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version update type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch # update patch number and adds a0
          - preminor # update minor number and adds a0
          - premajor # update major number and adds a0
          - prerelease # if final updates patch and adds a0, otherwise add +1 to the pre-release number
          - prerelease –next-phase # steps a > b > rc > final
          - none
        default: prerelease
      publish_to_test:
        description: 'Publish to test?'
        required: true
        type: boolean
        default: false
      publish_to_production:
        description: 'Publish to production?'
        required: true
        type: boolean
        default: false

# Set default permissions as restrictive as possible at workflow level
permissions: {}

jobs:
  build:
    ### if: ${{ github.event.inputs.publish_to_test == 'true' || github.event.inputs.publish_to_production == 'true' }}
    environment: test
    # Define only the specific permissions this job needs
    permissions:
      contents: write  # Needed to update the version number in pyproject.toml
      pull-requests: write  # Needed to create a pull request
    
    env:
      GH_TOKEN: ${{ github.token }}
      
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: master
  
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          
      - name: Install Poetry
        run: |
          pip install --upgrade pip
          pip install pipx
          pipx ensurepath
          pipx install poetry
  
      - name: Validate pyproject.toml
        run: poetry check

      - name: Update version with poetry
        id: update_version
        if: ${{ github.event.inputs.version != 'none' }}
        run: |
          poetry version ${{ github.event.inputs.version }}
          version=$(poetry version -s)
          echo "version=v$version" >> $GITHUB_OUTPUT

      - name: Create branch and version tag
        id: create_branch_tag
        if: steps.update_version.outcome == 'success'
        run: |
          git config user.name "camedomotic-unofficial"
          git config user.email "actions@github.com"
          git checkout -b update-version
          git add pyproject.toml
          git commit -m "chore: bump version to $version"
          git tag "${{ steps.update_version.outputs.version }}"
          git push origin update-version --tags

      - name: Create and merge pull request
        id: create_pr
        if: steps.create_branch_tag.outcome == 'success'
        run: |
          gh pr create --title "Update version to ${{ steps.update_version.outputs.version }}" --body "This pull request updates the library version to ${{ steps.update_version.outputs.version }}." --base master --head update-version
          gh pr merge --admin --squash --delete-branch --auto

      - name: Wait for PR to be merged
        if: steps.create_pr.outcome == 'success'
        run: |
          PR_NUMBER=$(gh pr list --head update-version --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "PR already merged or not found, checking by state..."
            PR_NUMBER=$(gh pr list --head update-version --state merged --json number --jq '.[0].number')
            if [ -n "$PR_NUMBER" ]; then
              echo "PR #$PR_NUMBER already merged."
              exit 0
            fi
            echo "::error::Could not find the PR"
            exit 1
          fi
          echo "Waiting for PR #$PR_NUMBER to be merged..."
          for i in $(seq 1 30); do
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
            if [ "$STATE" = "MERGED" ]; then
              echo "PR #$PR_NUMBER merged successfully."
              exit 0
            fi
            echo "Attempt $i/30: PR state is '$STATE'. Waiting 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for PR to be merged"
          exit 1

      - name: Checkout and push to master
        run: |
          git checkout master
          git pull origin master
          git push origin master

      - name: Remove new version tag on PR merging failure
        if: always() && steps.create_pr.outcome == 'failure'
        run: |
          git checkout master
          git tag -d "${{ steps.update_version.outputs.version }}"
          git push origin --delete "${{ steps.update_version.outputs.version }}"
        
      - name: Delete temporary branch
        if: always() && steps.create_pr.outcome == 'failure'
        run: |
          git checkout master
          git branch -D update-version
          git push origin --delete update-version        

      - name: Install package dependencies    
        run: poetry install --no-root
        
      - name: Build with poetry
        run: poetry build

      - name: Upload built package as artifact
        if: ${{ github.event.inputs.publish_to_test == 'true' || github.event.inputs.publish_to_production == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: built-package
          path: dist/*
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Show version value
        run: echo "The version is ${{ steps.update_version.outputs.version }}"

    outputs:
      version: ${{ steps.update_version.outputs.version }}


  publish_test:
    needs: build
    if: ${{ github.event.inputs.publish_to_test == 'true' }}
    environment: testpypi
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - name: Download built package
        uses: actions/download-artifact@v7
        with:
          name: built-package
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish_production:
    needs: [build]
    if: ${{ github.event.inputs.publish_to_production == 'true' }}
    environment: pypi
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
      # Needed to create a release
      contents: write

    steps:
      - name: Download built package
        uses: actions/download-artifact@v7
        with:
          name: built-package
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Checkout repository for tag lookup
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Generate release notes from previous tag
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TAG="${{ needs.build.outputs.version }}"
          # Find the previous version tag (excluding current)
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)
          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: $PREVIOUS_TAG"

          if [ -n "$PREVIOUS_TAG" ]; then
            # Generate notes between previous and current tag
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$CURRENT_TAG" \
              -f previous_tag_name="$PREVIOUS_TAG" \
              --jq '.body')
          else
            # No previous tag found, generate without constraint
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$CURRENT_TAG" \
              --jq '.body')
          fi

          # Write to file to preserve multiline content
          echo "$NOTES" > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          draft: true
          body_path: release_notes.md
          make_latest: true